# ════════════════════════════════════════════════════════════
# Geo Studio — Docker Compose (Full Stack)
# ════════════════════════════════════════════════════════════
#
# Production:  docker compose up -d
# Migrate:     docker compose run --rm migrate
# Logs:        docker compose logs -f app worker
# ════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geo_saas}
      POSTGRES_USER: ${POSTGRES_USER:-geo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geo_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports NOT exposed in production — only internal network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geo}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # ports NOT exposed in production — only internal network
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Next.js App ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geo}:${POSTGRES_PASSWORD:-geo_secret}@postgres:5432/${POSTGRES_DB:-geo_saas}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── BullMQ Worker ───────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["npx", "tsx", "src/workers/report.worker.ts"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geo}:${POSTGRES_PASSWORD:-geo_secret}@postgres:5432/${POSTGRES_DB:-geo_saas}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Prisma Migrate (one-shot) ───────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geo}:${POSTGRES_PASSWORD:-geo_secret}@postgres:5432/${POSTGRES_DB:-geo_saas}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
